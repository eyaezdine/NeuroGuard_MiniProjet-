spring:
  application:
    name: medical-history-service

  datasource:
    url: jdbc:h2:mem:medical_history_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: root
    password:

    jpa:
      hibernate:
        ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          format_sql: true
          dialect: org.hibernate.dialect.H2Dialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # Enable H2 console (accessible at http://localhost:8082/h2-console)
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8082

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true
    fetch-registry: true

jwt:
  secret: XDkzF2YNPA/7vXmPYJmaACjY6VBhwHJbr4pzPF5jguE=   # same secret as Node.js service

# Feign client for user-service (Node.js)
user-service:
  url: http://localhost:8081/api   # base URL of Node.js user service

logging:
  level:
    com.neuroguard.medicalhistoryservice: DEBUG
    org.springframework.security: DEBUG