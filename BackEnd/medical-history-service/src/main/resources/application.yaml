spring:
  application:
    name: medical-history-service

  datasource:
    url: jdbc:postgresql://localhost:5432/medical_history_db
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: 123456

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /

server:
  port: 8086

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true
    fetch-registry: true

security:
  oauth2:
    resourceserver:
      jwt:
        issuer-uri: http://localhost:8081/realms/neuroguard
        jwk-set-uri: http://localhost:8081/realms/neuroguard/protocol/openid-connect/certs

jwt:
  secret: XDkzF2YNPA/7vXmPYJmaACjY6VBhwHJbr4pzPF5jguE=   # same secret as Node.js service

logging:
  level:
    com.neuroguard.medicalhistoryservice: DEBUG
    org.springframework.security: DEBUG
    com.neuroguard.medicalhistoryservice.feign: DEBUG

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 10000