server:
  port: 8083

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    registry-fetch-interval-seconds: 5

spring:
  application:
    name: gateway
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
      routes:
        - id: user-auth
          uri: lb://user-service
          predicates:
            - Path=/api/auth/**
        - id: user-users
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
        - id: medical-provider
          uri: lb://medical-history-service
          predicates:
            - Path=/api/provider/medical-history/**
        - id: medical-patient
          uri: lb://medical-history-service
          predicates:
            - Path=/api/patient/medical-history/**
        - id: medical-caregiver
          uri: lb://medical-history-service
          predicates:
            - Path=/api/caregiver/medical-history/**
        - id: medical-files
          uri: lb://medical-history-service
          predicates:
            - Path=/files/**
        - id: medical-test
          uri: lb://medical-history-service
          predicates:
            - Path=/test
        - id: bien-etre
          uri: lb://ms-bien-etre
          predicates:
            - Path=/api/wellbeing/**
        - id: bien-etre-activities
          uri: lb://ms-bien-etre
          predicates:
            - Path=/api/activities/**
        - id: consultation
          uri: lb://consultation-service
          predicates:
            - Path=/api/consultations/**
        - id: forum
          uri: lb://forum-service
          predicates:
            - Path=/api/forum/**
        - id: livraison
          uri: lb://livraison
          predicates:
            - Path=/api/livraisons/**


logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty.http.client: DEBUG